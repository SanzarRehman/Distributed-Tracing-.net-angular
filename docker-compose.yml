services:
  # ─── Observability ─────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: pathfinder-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - pathfinder-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: pathfinder-otel-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
      - ./otel-data:/data
    ports:
      - "4319:4317"     # OTLP gRPC  — for external apps
      - "4320:4318"     # OTLP HTTP  — for browser / external apps
    environment:
      # Passed into otel-collector-config.yaml via native env-var expansion
      - CUSTOM_CONSUMER_ENDPOINT=${CUSTOM_CONSUMER_ENDPOINT}
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped
    networks:
      - pathfinder-network
    # otel-collector-contrib is distroless — no shell available for healthcheck.
    # The collector starts in < 1s so service_started is sufficient.

  # ─── Backend API ───────────────────────────────────────────────
  pathfinder-api:
    build:
      context: ./PathfinderApi
      dockerfile: Dockerfile
    container_name: pathfinder-api
    ports:
      - "5215:8080"
    environment:
      - OTEL_SERVICE_NAME=${DOTNET_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_DOTNET_AUTO_TRACES_ADDITIONAL_SOURCES=PathfinderApi
      # Auto-instrumentation: library hooks
      - OTEL_DOTNET_AUTO_TRACES_HTTPCLIENT_INSTRUMENTATION_ENABLED=true
      - OTEL_DOTNET_AUTO_TRACES_SQLCLIENT_INSTRUMENTATION_ENABLED=true
      - OTEL_DOTNET_AUTO_TRACES_ENTITYFRAMEWORKCORE_INSTRUMENTATION_ENABLED=true
      - OTEL_DOTNET_AUTO_TRACES_ASPNETCORE_INSTRUMENTATION_ENABLED=true
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:4200,http://localhost:4201}
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - NEWAPP_URL=http://newapp:8080/api/newapp/process
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - pathfinder-network

  # ─── NewApp and RabbitMQ ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: pathfinder-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - pathfinder-network

  newapp:
    build:
      context: ./NewApp
      dockerfile: Dockerfile
    container_name: pathfinder-newapp
    ports:
      - "8080:8080"
    environment:
      - OTEL_SERVICE_NAME=newapp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_DOTNET_AUTO_TRACES_ADDITIONAL_SOURCES=NewApp
      # Auto-instrumentation: library hooks
      - OTEL_DOTNET_AUTO_TRACES_HTTPCLIENT_INSTRUMENTATION_ENABLED=true
      - OTEL_DOTNET_AUTO_TRACES_SQLCLIENT_INSTRUMENTATION_ENABLED=true
      - OTEL_DOTNET_AUTO_TRACES_ASPNETCORE_INSTRUMENTATION_ENABLED=true
      - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - pathfinder-network

  # ─── Angular UIs ───────────────────────────────────────────────
  pathfinder-ui-zoneless:
    build:
      context: ./pathfinder-ui-zoneless
      dockerfile: Dockerfile
    container_name: pathfinder-ui-zoneless
    ports:
      - "4200:80"
    environment:
      - API_URL=${API_URL}
      - OTEL_URL=/otlp/v1/traces
      - JAEGER_URL=${JAEGER_URL:-http://localhost:16686}
    depends_on:
      - pathfinder-api
    networks:
      - pathfinder-network

networks:
  pathfinder-network:
    driver: bridge

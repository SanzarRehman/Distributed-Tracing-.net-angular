apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: {{ .Values.global.namespace }}
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: "{{ .Values.jaeger.image }}:{{ .Values.jaeger.tag }}"
        ports:
        - containerPort: {{ .Values.jaeger.port }}
          name: ui
        - containerPort: 4317
          name: otlp-grpc
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: {{ .Values.global.namespace }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.jaeger.port }}
    targetPort: {{ .Values.jaeger.port }}
    name: ui
  - port: 4317
    targetPort: 4317
    name: otlp-grpc
  selector:
    app: jaeger
